<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px 20px;
      text-align: center;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .chat-header p {
      font-size: 14px;
      margin-top: 8px;
      opacity: 0.9;
    }

    .header-images {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      background: linear-gradient(to bottom, rgba(102, 126, 234, 0.1), transparent);
    }

    .header-images img {
      width: 65px;
      height: 65px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      transition: transform 0.3s ease;
    }

    .header-images img:hover {
      transform: scale(1.1);
    }

    .chat-messages {
      padding: 20px;
      height: 400px;
      overflow-y: auto;
      background-color: #f8f9fa;
      flex-grow: 1;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    .message {
      margin: 15px 0;
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      position: relative;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user-message {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot-message {
      background-color: #fff;
      border: 2px solid #e9ecef;
      align-self: flex-start;
      margin-right: auto;
      border-bottom-left-radius: 4px;
      color: #333;
    }

    .message-time {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      text-align: right;
      margin-top: 6px;
    }

    .bot-message .message-time {
      color: #999;
    }

    .chat-input {
      display: flex;
      border-top: 2px solid #e9ecef;
      padding: 15px;
      background-color: #fff;
      gap: 10px;
    }

    #user-input {
      flex-grow: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    #user-input:focus {
      outline: none;
      border-color: #667eea;
    }

    #send-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    #send-btn:active {
      transform: translateY(0);
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .typing-indicator {
      background-color: #fff;
      border: 2px solid #e9ecef;
      border-radius: 18px;
      padding: 12px 16px;
      display: flex;
      gap: 6px;
      align-self: flex-start;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.7;
      }
      50% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    @media (max-width: 500px) {
      .chat-header h1 {
        font-size: 24px;
      }
      
      .header-images img {
        width: 55px;
        height: 55px;
      }
      
      .chat-messages {
        height: 350px;
      }
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <h1>💪 Fitness Assistant</h1>
      <p>Ask me anything about fitness, nutrition, or health</p>
    </div>

    <div class="header-images">
      <img src="https://cdn.shopify.com/s/files/1/0561/9253/2651/files/InlineImage1.jpg?v=1628756402" alt="Fitness 1">
      <img src="https://m.media-amazon.com/images/I/81BJw7tSaFL._AC_UF350,350_QL80_.jpg" alt="Fitness 2">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAGkZ6b3g6Qk_OTDYakHzBPaxE3x6YbD4xlA&s" alt="Fitness 3">
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your fitness question here... 🏋️" autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      addBotMessage("Yo! 👋 I'm your Fitness Assistant powered by Claude AI. Ready to help you crush those fitness goals! What's up?");
    });

    function addUserMessage(message) {
      const chatMessages = document.getElementById('chat-messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message user-message';
      const messageContent = document.createElement('div');
      messageContent.textContent = message;
      const messageTime = document.createElement('div');
      messageTime.className = 'message-time';
      messageTime.textContent = getCurrentTime();
      messageDiv.appendChild(messageContent);
      messageDiv.appendChild(messageTime);
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addBotMessage(message) {
      const chatMessages = document.getElementById('chat-messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot-message';
      const messageContent = document.createElement('div');
      messageContent.innerHTML = formatMessage(message);
      const messageTime = document.createElement('div');
      messageTime.className = 'message-time';
      messageTime.textContent = getCurrentTime();
      messageDiv.appendChild(messageContent);
      messageDiv.appendChild(messageTime);
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getCurrentTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatMessage(message) {
      message = message.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      message = message.replace(/\*(.*?)\*/g, '<em>$1</em>');
      message = message.replace(/\n/g, '<br>');
      return message;
    }

    function showTypingIndicator() {
      const chatMessages = document.getElementById('chat-messages');
      const typingIndicator = document.createElement('div');
      typingIndicator.className = 'typing-indicator';
      typingIndicator.innerHTML = '<span></span><span></span><span></span>';
      typingIndicator.id = 'typing-indicator';
      chatMessages.appendChild(typingIndicator);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTypingIndicator() {
      const typingIndicator = document.getElementById('typing-indicator');
      if (typingIndicator) {
        typingIndicator.remove();
      }
    }

    async function sendMessage() {
      const userInput = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const message = userInput.value.trim();
      
      if (!message) return;

      addUserMessage(message);
      userInput.value = '';
      sendBtn.disabled = true;
      showTypingIndicator();

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: `You are a friendly and knowledgeable fitness assistant. Answer fitness, nutrition, and health questions in a helpful, encouraging tone. Keep responses concise but informative.

User question: ${message}`
            }]
          })
        });

        if (!response.ok) {
          throw new Error(`API request failed with status ${response.status}`);
        }

        const data = await response.json();
        const answer = data.content[0].text;

        hideTypingIndicator();
        addBotMessage(answer);
      } catch (error) {
        console.error('Error:', error);
        hideTypingIndicator();
        addBotMessage("Oops! Something went wrong 😅 Please try again!");
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
